name: Deploy Next.js Site

on:
  push:
    branches: [main]
    paths:
      - 'next-site/**'
      - '.github/workflows/deploy-next.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-next
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: next-site/package-lock.json

      - name: Install dependencies
        working-directory: next-site
        run: npm ci --legacy-peer-deps

      - name: Generate content
        working-directory: next-site
        run: |
          python3 scripts/convert-content.py
          python3 scripts/extract-quiz.py

      - name: Build
        working-directory: next-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: next-site/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
